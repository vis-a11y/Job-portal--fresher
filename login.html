<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FresherJob Ecosystem</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <nav class="auth-nav">
    <h1>🚀 FresherJob</h1>
  </nav>

  <main class="auth-container">
    <div class="card auth-card glass">
      <h2>Welcome Back</h2>
      <p class="muted">Access your career dashboard and job matches.</p>
      
      <form id="loginForm" style="margin-top: 2rem;">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label>Secret Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required />
        </div>
        
        <button type="submit" class="btn-primary" style="margin-top: 1rem;">Login</button>
        
        <div style="margin-top: 1.5rem; text-align: center;">
          <p class="muted">Don't have an account? <a href="register.html">Register for Free</a></p>
        </div>
      </form>
    </div>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
