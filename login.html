<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FresherJob Ecosystem</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <nav class="auth-nav" style="display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem;">
    <h1>🚀 FresherJob</h1>
    <div style="display: flex; align-items: center; gap: 0.5rem;">
      <span class="theme-label" id="themeIcon">🌙</span>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode"></button>
      <span class="theme-label" id="themeLabel" style="color: var(--text-muted);">Dark</span>
    </div>
  </nav>

  <main class="auth-wrapper">
    <div class="card auth-card glass shimmer">
      <h2>Welcome Back</h2>
      <p class="muted">Access your career dashboard and job matches.</p>
      
      <form id="loginForm" style="margin-top: 2rem;">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label>Secret Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required />
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1.5rem; width: 100%;">Login to Portal</button>
        
        <div style="margin-top: 2rem; text-align: center;">
          <p class="muted" style="font-size: 0.9rem;">Don't have an account? <a href="register.html" style="color: var(--primary-bright); font-weight: 600; text-decoration: none;">Register Now</a></p>
        </div>
      </form>
    </div>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
