<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Fresher Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Fresher Job Portal</h1>
    <nav>
      <a href="login.html">Login</a>
    </nav>
  </header>
  <main class="register-container">
    <form id="registerForm">
      <h2>Create Account</h2>
      <label for="regName">Full Name</label>
      <input type="text" id="regName" required />
      <label for="regEmail">Email</label>
      <input type="email" id="regEmail" required />
      <label for="regPassword">Password</label>
      <input type="password" id="regPassword" required />
      <label for="regCollege">College</label>
      <input type="text" id="regCollege" required />
      <label for="regBranch">Branch</label>
      <input type="text" id="regBranch" required />
      <label for="regYear">Graduation Year</label>
      <input type="number" id="regYear" min="2000" max="2100" required />
      <button type="submit">Register</button>
    </form>
  </main>
  <script src="app.js"></script>
