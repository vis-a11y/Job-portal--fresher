<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FresherJob Ecosystem</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <nav class="auth-nav" style="display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem;">
    <h1>🚀 FresherJob</h1>
    <div style="display: flex; align-items: center; gap: 0.5rem;">
      <span class="theme-label" id="themeIcon">🌙</span>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode"></button>
      <span class="theme-label" id="themeLabel" style="color: var(--text-muted);">Dark</span>
    </div>
  </nav>

  <main class="auth-wrapper">
    <div class="card auth-card glass shimmer" style="max-width: 600px;">
      <h2>Join the Ecosystem</h2>
      <p class="muted">Start matching with verified fresher roles.</p>
      
      <form id="registerForm" style="margin-top: 2rem;">
        <div class="grid-2" style="gap: 1.5rem;">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="john@example.com" required />
          </div>
        </div>
        
        <div class="grid-2" style="gap: 1.5rem;">
          <div class="form-group">
            <label>Secret Password</label>
            <input type="password" name="password" placeholder="Min 6 characters" required />
          </div>
          <div class="form-group">
            <label>Account Role</label>
            <select name="role">
              <option value="fresher">Fresher (Candidate)</option>
              <option value="recruiter">Recruiter (Hiring Force)</option>
            </select>
          </div>
        </div>
        
        <div class="grid-2" style="gap: 1.5rem;">
          <div class="form-group">
            <label>College Name</label>
            <input type="text" name="college" placeholder="XYZ University" />
          </div>
          <div class="form-group">
            <label>Academic Branch</label>
            <input type="text" name="branch" placeholder="CSE / Mechanical / IT" />
          </div>
        </div>
        
        <div class="form-group">
          <label>Graduation Year</label>
          <input type="number" name="graduation_year" placeholder="2025" />
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1.5rem; width: 100%;">Create My Account</button>
        
        <div style="margin-top: 2rem; text-align: center;">
          <p class="muted" style="font-size: 0.9rem;">Already have an account? <a href="login.html" style="color: var(--primary-bright); font-weight: 600; text-decoration: none;">Sign In Here</a></p>
        </div>
      </form>
    </div>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
